<svg xmlns="http://www.w3.org/2000/svg" width="144" height="24" viewBox="0 0 144 24" shape-rendering="crispEdges">
  <defs>
    <style>
      .o{fill:#2b1e1a}.b{fill:#c98a52}.m{fill:#e9b67a}.c{fill:#f6d5ab}.p{fill:#f08aa8}.e{fill:#1b1417}
    </style>
  </defs>

  <!-- frame 1 idle -->
  <g transform="translate(0 0)">
    <rect x="8" y="3" width="3" height="3" class="o"/><rect x="13" y="3" width="3" height="3" class="o"/>
    <rect x="8" y="4" width="2" height="2" class="b"/><rect x="14" y="4" width="2" height="2" class="b"/>
    <rect x="6" y="6" width="12" height="11" class="o"/>
    <rect x="7" y="7" width="10" height="9" class="m"/>
    <rect x="8" y="8" width="8" height="7" class="c"/>
    <rect x="8" y="10" width="2" height="2" class="p"/><rect x="14" y="10" width="2" height="2" class="p"/>
    <rect x="10" y="9" width="1" height="1" class="e"/><rect x="13" y="9" width="1" height="1" class="e"/>
    <rect x="11" y="11" width="2" height="1" class="e"/>
    <rect x="9" y="17" width="2" height="2" class="o"/><rect x="13" y="17" width="2" height="2" class="o"/>
  </g>

  <!-- frame 2 blink -->
  <g transform="translate(24 0)">
    <rect x="8" y="3" width="3" height="3" class="o"/><rect x="13" y="3" width="3" height="3" class="o"/>
    <rect x="8" y="4" width="2" height="2" class="b"/><rect x="14" y="4" width="2" height="2" class="b"/>
    <rect x="6" y="7" width="12" height="11" class="o"/>
    <rect x="7" y="8" width="10" height="9" class="m"/>
    <rect x="8" y="9" width="8" height="7" class="c"/>
    <rect x="8" y="11" width="2" height="2" class="p"/><rect x="14" y="11" width="2" height="2" class="p"/>
    <rect x="10" y="10" width="1" height="1" class="e"/><rect x="13" y="10" width="1" height="1" class="e"/>
    <rect x="11" y="12" width="2" height="1" class="e"/>
    <rect x="9" y="18" width="2" height="2" class="o"/><rect x="13" y="18" width="2" height="2" class="o"/>
  </g>

  <!-- frame 3 smile -->
  <g transform="translate(48 0)">
    <rect x="8" y="3" width="3" height="3" class="o"/><rect x="13" y="3" width="3" height="3" class="o"/>
    <rect x="8" y="4" width="2" height="2" class="b"/><rect x="14" y="4" width="2" height="2" class="b"/>
    <rect x="6" y="6" width="12" height="11" class="o"/>
    <rect x="7" y="7" width="10" height="9" class="m"/>
    <rect x="8" y="8" width="8" height="7" class="c"/>
    <rect x="8" y="10" width="2" height="2" class="p"/><rect x="14" y="10" width="2" height="2" class="p"/>
    <rect x="10" y="9" width="1" height="1" class="e"/><rect x="13" y="9" width="1" height="1" class="e"/>
    <rect x="10" y="11" width="4" height="1" class="e"/>
    <rect x="9" y="17" width="2" height="2" class="o"/><rect x="13" y="17" width="2" height="2" class="o"/>
  </g>

  <!-- frame 4 hop -->
  <g transform="translate(72 0)">
    <rect x="8" y="2" width="3" height="3" class="o"/><rect x="13" y="2" width="3" height="3" class="o"/>
    <rect x="8" y="3" width="2" height="2" class="b"/><rect x="14" y="3" width="2" height="2" class="b"/>
    <rect x="6" y="5" width="12" height="11" class="o"/>
    <rect x="7" y="6" width="10" height="9" class="m"/>
    <rect x="8" y="7" width="8" height="7" class="c"/>
    <rect x="8" y="9" width="2" height="2" class="p"/><rect x="14" y="9" width="2" height="2" class="p"/>
    <rect x="10" y="8" width="1" height="1" class="e"/><rect x="13" y="8" width="1" height="1" class="e"/>
    <rect x="11" y="10" width="2" height="1" class="e"/>
    <rect x="9" y="16" width="2" height="2" class="o"/><rect x="13" y="16" width="2" height="2" class="o"/>
  </g>

  <!-- frame 5 side-left -->
  <g transform="translate(96 0)">
    <rect x="8" y="3" width="3" height="3" class="o"/>
    <rect x="8" y="4" width="2" height="2" class="b"/>
    <rect x="6" y="6" width="12" height="11" class="o"/>
    <rect x="7" y="7" width="10" height="9" class="m"/>
    <rect x="8" y="8" width="8" height="7" class="c"/>
    <rect x="8" y="10" width="2" height="2" class="p"/>
    <rect x="11" y="9" width="1" height="1" class="e"/>
    <rect x="12" y="11" width="2" height="1" class="e"/>
    <rect x="9" y="17" width="2" height="2" class="o"/><rect x="13" y="17" width="2" height="2" class="o"/>
  </g>

  <!-- frame 6 side-right -->
  <g transform="translate(120 0)">
    <rect x="13" y="3" width="3" height="3" class="o"/>
    <rect x="14" y="4" width="2" height="2" class="b"/>
    <rect x="6" y="6" width="12" height="11" class="o"/>
    <rect x="7" y="7" width="10" height="9" class="m"/>
    <rect x="8" y="8" width="8" height="7" class="c"/>
    <rect x="14" y="10" width="2" height="2" class="p"/>
    <rect x="12" y="9" width="1" height="1" class="e"/>
    <rect x="10" y="11" width="2" height="1" class="e"/>
    <rect x="9" y="17" width="2" height="2" class="o"/><rect x="13" y="17" width="2" height="2" class="o"/>
  </g>
</svg>
